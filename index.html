<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Grammar Quiz - SALVO GROUP</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ede9fe,#f5f3ff);
margin:0;
}

/* container */

.quiz-container{
max-width:900px;
margin:auto;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 25px 45px rgba(0,0,0,.12);
}

/* header */

.header{
background:linear-gradient(135deg,#7c3aed,#9333ea);
color:white;
padding:25px;
text-align:center;
}

/* score panel */

.score-panel{
display:flex;
justify-content:space-between;
padding:15px;
background:#faf5ff;
font-weight:bold;
}

.timer{
color:#7c3aed;
}

/* progress bar */

.progress-bar{
height:8px;
background:#eee;
}

#progressFill{
height:8px;
width:0%;
background:linear-gradient(90deg,#7c3aed,#9333ea);
transition:.3s;
}

/* question */

.question{
padding:25px;
font-size:22px;
font-weight:600;
}

/* options */

.option{
margin:12px 25px;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
cursor:pointer;
transition:.2s;
}

.option:hover{
background:#f3e8ff;
transform:scale(1.02);
}

.correct{
background:#dcfce7;
border-color:#22c55e;
}

.wrong{
background:#fee2e2;
border-color:#ef4444;
}

/* explanation */

.explanation{
background:#fff7ed;
margin:20px 25px;
padding:15px;
border-left:5px solid orange;
border-radius:10px;
}

/* navigation buttons */

.navigation{
display:flex;
justify-content:space-between;
padding:20px;
}

button{
padding:10px 18px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#7c3aed,#9333ea);
color:white;
cursor:pointer;
font-weight:bold;
}

button:disabled{
opacity:.4;
cursor:not-allowed;
}

/* question numbers */

.number-nav{
text-align:center;
padding:15px;
}

.number-nav button{
width:36px;
height:36px;
border-radius:50%;
margin:4px;
}

.active{
background:#111827 !important;
}

.answered{
background:#22c55e !important;
}

/* result */

.result{
display:none;
text-align:center;
padding:40px;
}

.grade{
font-size:30px;
font-weight:bold;
color:#7c3aed;
}

</style>
</head>

<body>

<div class="quiz-container">

<div class="header">
<h1><i class="fas fa-graduation-cap"></i> ADVANCED GRAMMAR QUIZ</h1>
<p>SALVO GROUP Interactive Quiz</p>
</div>

<div class="score-panel">
<div>Score: <span id="score">0</span></div>
<div class="timer">Time: <span id="timer">10:00</span></div>
</div>

<div class="progress-bar">
<div id="progressFill"></div>
</div>

<div id="quizArea"></div>

<div class="number-nav" id="numberNav"></div>

<div class="navigation">
<button id="prevBtn">Previous</button>
<button id="nextBtn">Next</button>
<button id="submitBtn">Submit</button>
</div>

<div class="result" id="resultBox">
<h2>Quiz Complete 🎉</h2>
<div id="finalScore"></div>
<div class="grade" id="grade"></div>
<br>
<button onclick="restartQuiz()">Restart</button>
</div>

</div>

<script>

/* ================= QUESTIONS ================= */

const questions = [

{
text:"You can sit ______ that chair. Nobody is sitting there",
options:["on","in","at","over"],
correct:0,
explanation:"Gunakan 'on' karena kursi adalah permukaan → sit on the chair"
},

{
text:"The police car came first. The president was in the car ______ it.",
options:["behind","under","inside","between"],
correct:0,
explanation:"Behind berarti di belakang kendaraan lain"
},

{
text:"The wine is ______ the bottle.",
options:["in","on","at","over"],
correct:0,
explanation:"Gunakan 'in the bottle'"
},

{
text:"Pass me the dictionary, it's ______ the bookshelf.",
options:["on","in","under","between"],
correct:0,
explanation:"Gunakan 'on the bookshelf'"
},

{
text:"Jessica is ______ work.",
options:["at","in","on","inside"],
correct:0,
explanation:"Gunakan 'at work'"
}

];

/* ================= STATE ================= */

let current = 0;
let answers = new Array(questions.length).fill(null);
let submitted = false;

/* ================= ELEMENT CACHE ================= */

const quizArea = document.getElementById("quizArea");
const progressFill = document.getElementById("progressFill");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const submitBtn = document.getElementById("submitBtn");
const numberNav = document.getElementById("numberNav");
const scoreDisplay = document.getElementById("score");
const timerDisplay = document.getElementById("timer");
const resultBox = document.getElementById("resultBox");
const finalScore = document.getElementById("finalScore");
const gradeBox = document.getElementById("grade");

/* ================= RENDER ================= */

function renderQuestion(){

const q = questions[current];

let html = `<div class="question">${q.text}</div>`;

q.options.forEach((opt,i)=>{

let cls="option";

if(answers[current]!==null){

if(i===q.correct) cls+=" correct";

if(i===answers[current] && i!==q.correct)
cls+=" wrong";

}

html+=`
<div class="${cls}" data-index="${i}">
${String.fromCharCode(65+i)}. ${opt}
</div>`;

});

if(answers[current]!==null){

html+=`
<div class="explanation">
💡 Penjelasan: ${q.explanation}
</div>`;

}

quizArea.innerHTML = html;

/* CLICK FIX */

document.querySelectorAll(".option").forEach(el=>{
el.addEventListener("click",()=>{
selectAnswer(parseInt(el.dataset.index));
});
});

updateProgress();
updateNumberNav();
updateNavButtons();

}

/* ================= ANSWER ================= */

function selectAnswer(i){

if(answers[current]!==null || submitted) return;

answers[current]=i;

/* confetti safe */

if(i===questions[current].correct){

if(typeof confetti==="function"){
confetti({
particleCount:120,
spread:80,
origin:{y:.6}
});
}

}

updateScore();

setTimeout(renderQuestion,200);

}

/* ================= SCORE ================= */

function updateScore(){

let score=0;

answers.forEach((a,i)=>{
if(a===questions[i].correct) score++;
});

scoreDisplay.innerText=score;

}

/* ================= PROGRESS ================= */

function updateProgress(){

let done=answers.filter(a=>a!==null).length;

progressFill.style.width=
(done/questions.length*100)+"%";

}

/* ================= NAVIGATION ================= */

function updateNavButtons(){

prevBtn.disabled=current===0;
nextBtn.disabled=current===questions.length-1;

}

function updateNumberNav(){

let html="";

for(let i=0;i<questions.length;i++){

let cls="";

if(answers[i]!==null) cls+="answered ";

if(i===current) cls+="active";

html+=`<button class="${cls}" onclick="goTo(${i})">${i+1}</button>`;

}

numberNav.innerHTML=html;

}

function goTo(i){

current=i;
renderQuestion();

}

/* ================= TIMER ================= */

let timeLeft=600;

const timerInterval=setInterval(()=>{

if(submitted) return;

let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

timerDisplay.innerText=
`${m}:${s.toString().padStart(2,'0')}`;

if(timeLeft<=0) submitQuiz();

timeLeft--;

},1000);

/* ================= SUBMIT ================= */

submitBtn.onclick=submitQuiz;

function submitQuiz(){

submitted=true;

clearInterval(timerInterval);

let score=answers.filter((a,i)=>a===questions[i].correct).length;

let percent=Math.round(score/questions.length*100);

let grade="E";

if(percent>=90) grade="A";
else if(percent>=80) grade="B";
else if(percent>=70) grade="C";
else if(percent>=60) grade="D";

resultBox.style.display="block";

finalScore.innerText=
`Score ${score}/${questions.length} (${percent}%)`;

gradeBox.innerText=
`Grade ${grade}`;

if(typeof confetti==="function") confetti();

}

/* ================= RESTART ================= */

function restartQuiz(){

location.reload();

}

/* ================= INIT ================= */

renderQuestion();

</script>

</body>
</html>
